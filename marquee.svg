<svg fill="none" viewBox="0 0 800 50" width="800" height="50" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        .marquee-wrap {
          height: 50px;
          width: 100%;
          overflow: hidden;
          position: relative;
          background: #0d1117;
          border-top: 1px solid #1a1b27;
          border-bottom: 1px solid #1a1b27;
        }
        .marquee-text {
          font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
          color: #7aa2f7;
          position: absolute;
          font-size: 1em;
          font-weight: 600;
          letter-spacing: 0.04em;
          white-space: nowrap;
          height: 100%;
          line-height: 50px;
          transform: translateX(100%);
          animation: scroll 12s linear infinite;
        }
        @keyframes scroll {
          0%   { transform: translateX(100%); }
          100% { transform: translateX(-100%); }
        }
      </style>
      <div class="marquee-wrap">
        <span class="marquee-text">Thanks for visiting my profile — feel free to reach out, collaborate, or just say hi! See you next time!</span>
      </div>
    </div>
  </foreignObject>
</svg>
